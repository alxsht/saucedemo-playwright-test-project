name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      BASE_URL: https://www.saucedemo.com
      STANDARD_USER: ${{ secrets.STANDARD_USER }}
      STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required secrets
        run: |
          test -n "${STANDARD_USER}" || (echo "Missing GitHub Secret: STANDARD_USER" && exit 1)
          test -n "${STANDARD_PASSWORD}" || (echo "Missing GitHub Secret: STANDARD_PASSWORD" && exit 1)

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results (traces/videos/screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
